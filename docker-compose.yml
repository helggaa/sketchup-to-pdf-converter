services:
  backend:
    build: .
    container_name: sketchup-pdf-backend
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    container_name: sketchup-pdf-frontend
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
